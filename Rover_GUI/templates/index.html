<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nomader - Rover Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon"></span>
                <h1>__THE NOMADER__</h1>
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">CONNECTING...</span>
            </div>
            <div class="stats-panel">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">CPU</span>
                        <span class="stat-value" id="cpuUsage">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">TEMP</span>
                        <span class="stat-value" id="cpuTemp">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">RAM</span>
                        <span class="stat-value" id="ramUsage">--</span>
                    </div>
                </div>
            </div>
            <div class="quick-actions">
                <button class="action-btn emergency-btn" id="emergencyStop">
                    <span class="btn-icon"></span>
                    <span>EMERGENCY RESET</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="main-grid">
                <!-- Left: Camera Feed -->
                <section class="camera-section">
                    <div class="camera-container">
                        <img id="cameraFeed" src="{{ url_for('video_feed') }}" alt="Camera Feed">
                        <div class="camera-overlay">
                            <div class="hud-item">
                                <span class="hud-label">SPEED</span>
                                <span class="hud-value" id="speedDisplay">0</span>
                            </div>
                            <div class="hud-item">
                                <span class="hud-label">HEADING</span>
                                <span class="hud-value" id="headingDisplay">0°</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Right: Controls Panel -->
                <section class="controls-panel">
                    
                    <div class="control-box">
                        <h3 class="box-title">ROBOT CONTROL</h3>
                        <div class="values-grid">
                            <div class="value-display">
                                <span class="value-label">LEFT</span>
                                <span class="value-number" id="leftMotor">0</span>
                            </div>
                            <div class="value-display">
                                <span class="value-label">PITCH</span>
                                <span class="value-number" id="pitchDisplay">90</span>
                                <span class="value-unit">°</span>
                            </div>
                            
                        </div>
                        <div class="values-grid">
                            <div class="value-display">
                                <span class="value-label">RIGHT</span>
                                <span class="value-number" id="rightMotor">0</span>
                            </div>
                            <div class="value-display">
                                <span class="value-label">YAW</span>
                                <span class="value-number" id="yawDisplay">90</span>
                                <span class="value-unit">°</span>
                            </div>
                        </div>
                        <div class="keyboard-hints">
                            <div class="hint-row">
                                <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
                                <pre>                            </pre>
                                <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
                            </div>
                        </div>
                        <div class="slider-container">
                            <input type="range" id="lightSlider" min="0" max="255" value="0" class="slider">
                            <div class="slider-fill" id="lightFill"></div>
                        </div>
                        <div class="slider-value">
                            <span id="lightValue">0</span>
                            <span class="unit">/ 255</span>
                        </div>
                    </div>

                   

                    <!-- Light Control -->
                    <div class="control-box">
                        <h3 class="box-title">LIGHT CONTROL</h3>
                        
                        <div class="keyboard-hints">
                            <div class="hint-row">
                                <kbd>Q</kbd> <span class="hint-text">Dim</span>
                                <kbd>E</kbd> <span class="hint-text">Bright</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/controls.js') }}"></script>
</body>
</html>
